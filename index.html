<head>

    <title>Intro to CSS</title>
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
        }

        main {
            flex: 1;
        }

        footer {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0px;
            background-color: #7bcaee;
            border-top-right-radius: 10px;
            border-top-left-radius: 10px;
        }
        footer p {
            margin: 10px;
            
        }
    </style>
</head>
<body>
    <nav>
        
    </nav>
    <header>
        
    </header>
    <main>
        <section>
            <p>This is a simple paragraph. <strong>This paragraph is block element</strong></p>
            <p><strong>This is Bold Text..</strong><em>this <strong>&lt; strong &gt;</strong> element is inline</em> </p>
            <p><em>This is Italic Text..</em><em>this <strong>&lt; em &gt;</strong> element is inline</em></p>
            <ol style="display: flex; gap: 20px; flex-direction: row; justify-content: space-around; background-color: tomato; padding: 20px; list-style-position: inside;">
                <li style="background-color: #7bcaee; height: 30px; padding: 20px; border: 5px solid #d80b0b; margin: 5px; list-style-type: decimal; display: flex; align-items: center;">First item</li>
                <li style="background-color: #7bcaee; height: 30px; padding: 20px; border: 5px solid #d80b0b; margin: 5px; list-style-type: decimal; display: flex; align-items: center;">Second item</li>

            </ol >

                <li style="background-color: #7bcaee; height: auto; padding: 10px; border: 5px solid #d80b0b; margin: 5px; display: flex; align-items: center; justify-content: center; box-sizing: border-box;"><a href="https://google.com" target="_blank"><img style="width: 90px; height: 40px; object-fit: contain; display: block;" src="https://play-lh.googleusercontent.com/1-hPxafOxdYpYZEOKzNIkSP43HXCNftVJVttoo4ucl7rsMASXW3Xr6GlXURCubE1tA=w3840-h2160-rw" alt="Google"></a></li>
